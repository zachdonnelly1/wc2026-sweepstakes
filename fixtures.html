<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 Sweepstakes — Fixtures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .stage-block { margin-bottom: 24px; }
    .stage-heading {
      font-family: var(--font-pixel);
      font-size: 7px;
      color: var(--text-muted);
      letter-spacing: 2px;
      padding: 10px 0 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .date-group { margin-bottom: 12px; }
    .date-label {
      font-family: var(--font-pixel);
      font-size: 6px;
      color: var(--text-dim);
      letter-spacing: 1px;
      padding: 6px 12px;
      background: var(--bg-row);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 0 0;
      display: block;
    }
    .fixture {
      display: grid;
      grid-template-columns: 1fr 80px 1fr 70px;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: none;
      font-size: 12px;
    }
    .fixture:last-child { border-radius: 0 0 var(--radius) var(--radius); }
    .fixture.live { border-left: 3px solid var(--teal); background: rgba(64,224,160,.04); }
    .fixture.finished { opacity: .8; }

    .team-name { font-family: var(--font-mono); color: var(--text-primary); }
    .team-name.home { text-align: right; }
    .team-name.away { text-align: left; }

    .score-box {
      text-align: center;
      font-family: var(--font-pixel);
      font-size: 11px;
      color: var(--yellow);
      white-space: nowrap;
    }
    .score-box.upcoming { font-size: 9px; color: var(--text-dim); }
    .score-box.live { color: var(--teal); }

    .fixture-meta {
      font-family: var(--font-pixel);
      font-size: 6px;
      color: var(--text-dim);
      text-align: right;
      white-space: nowrap;
    }
    .live-badge {
      display: inline-block;
      font-family: var(--font-pixel);
      font-size: 6px;
      color: var(--teal);
      border: 1px solid var(--teal);
      padding: 2px 5px;
      animation: blink 1.2s step-end infinite;
    }

    .filter-bar {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .filter-btn {
      font-family: var(--font-pixel);
      font-size: 6px;
      padding: 7px 12px;
      background: var(--bg-row);
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius);
      letter-spacing: 1px;
    }
    .filter-btn.active, .filter-btn:hover {
      border-color: var(--yellow);
      color: var(--yellow);
    }
  </style>
</head>
<body>

<header class="site-header scanline">
  <div class="container">
    <h1 class="site-title">FIXTURES &<br>RESULTS</h1>
    <p class="site-meta"><span class="live-dot"></span><span id="header-meta">LOADING</span></p>
    <nav class="nav-links">
      <a href="index.html">LEADERBOARD</a>
      <a href="draw.html">DRAW</a>
      <a href="fixtures.html" class="active">FIXTURES</a>
      <a href="how-it-works.html">HOW IT WORKS</a>
      <a href="admin.html">ADMIN</a>
    </nav>
  </div>
</header>

<main class="container">

  <div id="error-banner"></div>

  <div class="meta-bar">
    <span class="meta-info" id="last-updated">UPDATED: —</span>
    <div class="meta-actions">
      <button class="btn-ghost" id="refresh-btn">↻ REFRESH</button>
    </div>
  </div>

  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-stage="ALL">ALL</button>
    <button class="filter-btn" data-stage="GROUP_STAGE">GROUP STAGE</button>
    <button class="filter-btn" data-stage="LAST_32">RD OF 32</button>
    <button class="filter-btn" data-stage="LAST_16">RD OF 16</button>
    <button class="filter-btn" data-stage="QUARTER_FINALS">QUARTER-FINALS</button>
    <button class="filter-btn" data-stage="SEMI_FINALS">SEMI-FINALS</button>
    <button class="filter-btn" data-stage="FINAL">FINAL</button>
  </div>

  <div id="fixtures-container">
    <p style="font-family:var(--font-pixel);font-size:8px;color:var(--text-dim);padding:40px 0;text-align:center">LOADING FIXTURES...</p>
  </div>

</main>

<script src="js/config.js"></script>
<script src="js/teams.js"></script>
<script src="js/api.js"></script>
<script src="js/fixtures.js"></script>
</body>
</html>
