name: Update match data

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch matches from football-data.org
        run: |
          curl -sf \
            -H "X-Auth-Token: ${{ secrets.FOOTBALL_API_TOKEN }}" \
            "https://api.football-data.org/v4/competitions/2000/matches" \
            -o data/matches.json

      - name: Merge live and finished scores
        env:
          FOOTBALL_API_TOKEN: ${{ secrets.FOOTBALL_API_TOKEN }}
        run: python3 .github/scripts/merge_matches.py

      - name: Generate daily summary if game day complete
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 .github/scripts/generate_summary.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/matches.json data/daily-summary.json
          git diff --staged --quiet || git commit -m "chore: update match data [skip ci]"
          git push
