<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 Sweepstakes — Leaderboard</title>
  <meta name="description" content="World Cup 2026 sweepstakes live leaderboard">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="page-header">
  <div class="container">
    <div class="inner">
      <div class="site-title">
        <span class="trophy">🏆</span>
        WC2026 Sweepstakes
      </div>
      <nav class="nav-links">
        <a href="index.html">Leaderboard</a>
        <a href="draw.html">Draw</a>
        <a href="admin.html">Admin</a>
      </nav>
    </div>
  </div>
</header>

<main class="container">

  <div id="error-banner"></div>

  <!-- Prize pool summary -->
  <div class="card prize-panel" style="margin-bottom:24px">
    <div class="section-title">💰 The Avalanche — Prize Pool</div>
    <div id="prize-panel">Loading...</div>
  </div>

  <!-- Meta bar -->
  <div class="meta-bar">
    <div class="meta-info">
      <span id="match-count">—</span> &nbsp;·&nbsp;
      <span id="last-updated">—</span>
    </div>
    <div class="actions">
      <button class="btn btn--ghost btn--sm" id="refresh-btn">↻ Refresh</button>
      <button class="btn btn--whatsapp" id="whatsapp-btn">Share on WhatsApp</button>
    </div>
  </div>

  <!-- Player cards -->
  <div class="players-grid" id="players-grid">
    <p class="muted center" style="padding:40px 0">Loading standings...</p>
  </div>

</main>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/teams.js"></script>
<script src="js/db.js"></script>
<script src="js/api.js"></script>
<script src="js/prizes.js"></script>
<script src="js/leaderboard.js"></script>

</body>
</html>
