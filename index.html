<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 Sweepstakes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Predictions ── */
    .pred-section-title {
      font-family: var(--font-pixel); font-size: 7px; color: var(--text-muted);
      letter-spacing: 2px; margin-bottom: 12px;
    }
    .pred-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }
    .pred-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .pred-header {
      font-family: var(--font-pixel); font-size: 7px;
      color: var(--text-primary);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      padding: 12px 14px 4px;
      letter-spacing: 1px;
    }
    .pred-prize { color: var(--yellow); }
    .pred-locked-tag {
      font-size: 6px; color: var(--teal);
      border: 1px solid rgba(64,236,168,.4); padding: 1px 5px;
    }
    .pred-subtitle {
      font-size: 10px; color: var(--text-dim);
      padding: 2px 14px 10px; border-bottom: 1px solid var(--border);
    }
    .pred-row {
      display: grid;
      grid-template-columns: 24px 1fr auto;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      border-bottom: 1px solid var(--border);
    }
    .pred-row:last-child { border-bottom: none; }
    .pred-row--leader { background: rgba(245,232,64,.04); border-left: 3px solid var(--yellow); }
    .pred-row--locked { background: rgba(64,236,168,.04); border-left: 3px solid var(--teal); }
    .pred-rank { font-family: var(--font-pixel); font-size: 7px; color: var(--text-dim); }
    .pred-row--leader .pred-rank { color: var(--yellow); }
    .pred-row--locked .pred-rank { color: var(--teal); }
    .pred-info { min-width: 0; }
    .pred-main {
      font-family: var(--font-pixel); font-size: 7px;
      color: var(--text-primary); display: flex; align-items: center; gap: 5px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .pred-sub { font-size: 10px; color: var(--text-muted); display: block; margin-top: 2px; }
    .pred-stat { text-align: right; }
    .pred-val { font-family: var(--font-pixel); font-size: 9px; color: var(--yellow); }
    .pred-row:not(.pred-row--leader):not(.pred-row--locked) .pred-val { color: var(--text-muted); }
    .pred-leader-dot {
      display: inline-block; width: 5px; height: 5px;
      background: var(--yellow); border-radius: 50%;
      animation: blink 1s step-end infinite;
    }
    .pred-empty { padding: 14px; font-size: 11px; color: var(--text-dim); text-align: center; }
  </style>
</head>
<body>

<header class="site-header scanline">
  <div class="container">
    <h1 class="site-title">WORLD CUP<br>SWEEPSTAKES '26</h1>
    <p class="site-meta"><span class="live-dot"></span><span id="header-stage">LOADING</span> · 16 PLAYERS · €240 POT</p>
    <nav class="nav-links">
      <a href="index.html" class="active">LEADERBOARD</a>
      <a href="draw.html">DRAW</a>
      <a href="fixtures.html">FIXTURES</a>
      <a href="admin.html">ADMIN</a>
      <a href="how-it-works.html">HOW IT WORKS</a>
    </nav>
  </div>
</header>

<!-- Payout alert banner (shown once per device when a new prize locks in) -->
<div id="payout-banner" class="payout-banner" style="display:none" role="alert">
  <div class="payout-banner-inner">
    <span class="payout-banner-icon" id="payout-banner-icon">🏆</span>
    <div class="payout-banner-text">
      <span class="payout-banner-eyebrow" id="payout-banner-eyebrow">🎉 PAYOUT ALERT</span>
      <span class="payout-banner-msg" id="payout-banner-msg"></span>
    </div>
    <span class="payout-banner-amt" id="payout-banner-amt"></span>
    <button class="payout-banner-close" id="payout-banner-close" aria-label="Dismiss">✕</button>
  </div>
</div>

<main class="container">

  <div id="error-banner"></div>

  <!-- Stat cards -->
  <div class="stat-grid">
    <div class="stat-card">
      <p class="stat-label">TOTAL POT</p>
      <p class="stat-value">€240</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">PLAYERS</p>
      <p class="stat-value blue" id="stat-players">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">PLAYERS ALIVE</p>
      <p class="stat-value teal" id="stat-players-alive">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">TEAMS ALIVE</p>
      <p class="stat-value teal" id="stat-alive">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">CURRENT ROUND</p>
      <p class="stat-value blue" id="stat-stage">—</p>
    </div>
  </div>

  <!-- Meta bar -->
  <div class="meta-bar">
    <span class="meta-info" id="last-updated">LAST UPDATED: —</span>
    <div class="meta-actions">
      <button class="btn-ghost" id="refresh-btn">↻ REFRESH</button>
      <button class="btn btn-whatsapp" style="font-size:8px;padding:10px 16px" id="whatsapp-btn">📲 SHARE</button>
    </div>
  </div>

  <!-- Leaderboard -->
  <div id="players-grid"></div>

  <!-- Payouts timeline (only shown when prizes are locked) -->
  <div id="payouts-section" style="display:none">
    <div id="payouts-timeline"></div>
  </div>

  <!-- Predictions -->
  <div style="margin-bottom:20px">
    <p class="pred-section-title">// PRIZE PREDICTIONS — LIVE PROJECTIONS</p>
    <div id="predictions-container"></div>
  </div>

  <!-- Prize pool -->
  <div class="card" style="padding:0">
    <div style="padding:16px 14px 0">
      <p class="panel-title">// THE AVALANCHE — PRIZE POOL</p>
    </div>
    <div id="prize-panel"></div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/teams.js"></script>
<script src="js/db.js"></script>
<script src="js/api.js"></script>
<script src="js/prizes.js"></script>
<script src="js/leaderboard.js"></script>
</body>
</html>
