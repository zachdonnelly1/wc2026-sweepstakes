<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WC2026 Sweepstakes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header scanline">
  <div class="container">
    <h1 class="site-title">WORLD CUP<br>SWEEPSTAKES '26</h1>
    <p class="site-meta"><span class="live-dot"></span><span id="header-stage">LOADING</span> · 16 PLAYERS · €240 POT</p>
    <nav class="nav-links">
      <a href="index.html" class="active">LEADERBOARD</a>
      <a href="draw.html">DRAW</a>
      <a href="fixtures.html">FIXTURES</a>
      <a href="how-it-works.html">HOW IT WORKS</a>
      <a href="admin.html">ADMIN</a>
    </nav>
  </div>
</header>

<main class="container">

  <div id="error-banner"></div>

  <!-- Stat cards -->
  <div class="stat-grid">
    <div class="stat-card">
      <p class="stat-label">TOTAL POT</p>
      <p class="stat-value">€240</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">PLAYERS</p>
      <p class="stat-value blue" id="stat-players">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">PLAYERS ALIVE</p>
      <p class="stat-value teal" id="stat-players-alive">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">TEAMS ALIVE</p>
      <p class="stat-value teal" id="stat-alive">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">CURRENT ROUND</p>
      <p class="stat-value blue" id="stat-stage">—</p>
    </div>
  </div>

  <!-- Meta bar -->
  <div class="meta-bar">
    <span class="meta-info" id="last-updated">LAST UPDATED: —</span>
    <div class="meta-actions">
      <button class="btn-ghost" id="refresh-btn">↻ REFRESH</button>
      <button class="btn btn-whatsapp" style="font-size:8px;padding:10px 16px" id="whatsapp-btn">📲 SHARE</button>
    </div>
  </div>

  <!-- Leaderboard -->
  <div id="players-grid"></div>

  <!-- Prize pool -->
  <div class="card" style="padding:0">
    <div style="padding:16px 14px 0">
      <p class="panel-title">// THE AVALANCHE — PRIZE POOL</p>
    </div>
    <div id="prize-panel"></div>
  </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/teams.js"></script>
<script src="js/db.js"></script>
<script src="js/api.js"></script>
<script src="js/prizes.js"></script>
<script src="js/leaderboard.js"></script>
</body>
</html>
